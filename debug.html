<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Auth Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; font-size: 14px; }
        .pass { color: #0f0; } .fail { color: #f00; } .warn { color: #ff0; }
        h2 { color: #0ff; }
        pre { background: #111; padding: 12px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Authentication System Debug</h1>
    <div id="output"></div>
    <script>
    var output = document.getElementById('output');

    function log(msg, cls) {
        var div = document.createElement('div');
        div.className = cls || '';
        div.textContent = msg;
        output.appendChild(div);
    }

    function logPre(msg) {
        var pre = document.createElement('pre');
        pre.textContent = msg;
        output.appendChild(pre);
    }

    // 1. Check localStorage
    log('=== 1. localStorage 检查 ===');
    var usersRaw = localStorage.getItem('songdye_users');
    if (usersRaw) {
        var users = JSON.parse(usersRaw);
        log('用户数量: ' + users.length, 'pass');
        users.forEach(function(u) {
            log('  用户: ' + u.username + ' | 角色: ' + u.role + ' | 密码哈希: ' + (u.passwordHash || '').substring(0, 16) + '...', u.passwordHash ? 'pass' : 'fail');
        });
    } else {
        log('localStorage 中无用户数据！', 'fail');
    }

    // 2. Check sessionStorage
    log('\n=== 2. sessionStorage 检查 ===');
    var sessionRaw = sessionStorage.getItem('songdye_session');
    if (sessionRaw) {
        log('会话: ' + sessionRaw, 'pass');
    } else {
        log('无活跃会话', 'warn');
    }

    var attempts = sessionStorage.getItem('songdye_login_attempts');
    var lockout = sessionStorage.getItem('songdye_lockout_until');
    log('失败次数: ' + (attempts || '0'));
    log('锁定至: ' + (lockout ? new Date(parseInt(lockout)).toLocaleString() : '无'));

    // 3. Test SHA-256
    log('\n=== 3. SHA-256 哈希测试 ===');
    function sha256(message) {
        var K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
        function rr(v, a) { return (v >>> a) | (v << (32 - a)); }
        var bytes = [];
        for (var i = 0; i < message.length; i++) {
            var c = message.charCodeAt(i);
            if (c < 0x80) bytes.push(c);
            else if (c < 0x800) bytes.push(0xc0 | (c >> 6), 0x80 | (c & 0x3f));
            else if (c < 0xd800 || c >= 0xe000) bytes.push(0xe0 | (c >> 12), 0x80 | ((c >> 6) & 0x3f), 0x80 | (c & 0x3f));
            else { i++; c = ((c & 0x3ff) << 10) | (message.charCodeAt(i) & 0x3ff); bytes.push(0xf0 | (c >> 18), 0x80 | ((c >> 12) & 0x3f), 0x80 | ((c >> 6) & 0x3f), 0x80 | (c & 0x3f)); }
        }
        var msgLen = bytes.length; bytes.push(0x80);
        while ((bytes.length % 64) !== 56) bytes.push(0);
        var bitLen = msgLen * 8; bytes.push(0,0,0,0,(bitLen>>>24)&0xff,(bitLen>>>16)&0xff,(bitLen>>>8)&0xff,bitLen&0xff);
        var h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
        for (var o=0;o<bytes.length;o+=64) {
            var w=new Array(64);
            for(var j=0;j<16;j++) w[j]=(bytes[o+j*4]<<24)|(bytes[o+j*4+1]<<16)|(bytes[o+j*4+2]<<8)|bytes[o+j*4+3];
            for(j=16;j<64;j++){var s0=rr(w[j-15],7)^rr(w[j-15],18)^(w[j-15]>>>3);var s1=rr(w[j-2],17)^rr(w[j-2],19)^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+s1)|0;}
            var a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
            for(j=0;j<64;j++){var S1=rr(e,6)^rr(e,11)^rr(e,25);var ch=(e&f)^(~e&g);var t1=(h+S1+ch+K[j]+w[j])|0;var S0=rr(a,2)^rr(a,13)^rr(a,22);var maj=(a&b)^(a&c)^(b&c);var t2=(S0+maj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
            h0=(h0+a)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0;
        }
        var hex='';[h0,h1,h2,h3,h4,h5,h6,h7].forEach(function(h){hex+=('00000000'+(h>>>0).toString(16)).slice(-8);});
        return hex;
    }

    var testHash = sha256('songdye2026');
    var expectedHash = '9b54aada688b1950f3737ab8082309ef63fb69d878242bfeaef14035ce390d2f';
    log('SHA-256("songdye2026") = ' + testHash, testHash === expectedHash ? 'pass' : 'fail');
    log('Expected              = ' + expectedHash);

    // 4. Simulate login
    log('\n=== 4. 模拟登录测试 ===');
    if (usersRaw) {
        var users = JSON.parse(usersRaw);
        var adminUser = users.find(function(u) { return u.username === 'admin'; });
        if (adminUser) {
            var inputHash = sha256('songdye2026');
            log('输入密码哈希: ' + inputHash);
            log('存储密码哈希: ' + adminUser.passwordHash);
            log('匹配结果: ' + (inputHash === adminUser.passwordHash ? '成功' : '失败'), inputHash === adminUser.passwordHash ? 'pass' : 'fail');
        }

        // Check non-admin users
        var normalUsers = users.filter(function(u) { return u.role === 'user'; });
        log('\n普通用户数量: ' + normalUsers.length);
        normalUsers.forEach(function(u) {
            log('  用户: ' + u.username + ' | 密码哈希: ' + u.passwordHash);
        });
    }

    // 5. Check DOM elements
    log('\n=== 5. DOM 元素检查 ===');
    var elements = ['auth-login-overlay', 'auth-login-form', 'auth-username', 'auth-password', 'auth-login-btn', 'auth-login-error', 'app-main', 'auth-user-bar'];
    elements.forEach(function(id) {
        var el = document.getElementById(id);
        log('  #' + id + ': ' + (el ? '存在' : '缺失'), el ? 'pass' : 'fail');
    });

    // 6. Check script loading
    log('\n=== 6. 脚本加载检查 ===');
    log('  AuthSystem: ' + (window.AuthSystem ? '已加载' : '未加载'), window.AuthSystem ? 'pass' : 'fail');
    log('  app.js: ' + (window.EventBus ? '已加载' : '未加载'), window.EventBus ? 'pass' : 'fail');
    </script>
</body>
</html>
