<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- 深靛蓝 → 宋瓷天青 渐变 -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="35%" stop-color="#2C5F7C"/>
      <stop offset="70%" stop-color="#5B9EA8"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </linearGradient>

    <!-- 内部高光渐变 -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- 电路板线条渐变 -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(168,216,234,0.9)"/>
      <stop offset="100%" stop-color="rgba(27,42,74,0.6)"/>
    </linearGradient>
  </defs>

  <!-- 水滴主体 -->
  <path d="M100 15
           C100 15, 55 70, 40 110
           C30 140, 35 175, 65 195
           C85 210, 115 210, 135 195
           C165 175, 170 140, 160 110
           C145 70, 100 15, 100 15Z"
        fill="url(#dropGrad)"
        stroke="rgba(168,216,234,0.4)"
        stroke-width="1.5"/>

  <!-- 高光 -->
  <path d="M100 22
           C100 22, 65 72, 52 108
           C44 132, 48 158, 68 175
           C82 187, 102 187, 115 178
           C125 170, 128 155, 120 142
           C110 125, 95 115, 88 95
           C80 72, 100 22, 100 22Z"
        fill="url(#highlight)"/>

  <!-- 电路板纹理 -->
  <g stroke="url(#circuitGrad)" fill="none" stroke-width="1.2" stroke-linecap="round">
    <!-- 主干线路 -->
    <path d="M100 35 L100 55 L80 75 L80 95"/>
    <path d="M100 55 L120 70 L120 90 L140 105"/>
    <path d="M100 75 L100 95 L85 115 L85 135"/>
    <path d="M100 95 L115 110 L115 130 L130 145"/>
    <path d="M80 115 L60 130 L60 150"/>
    <path d="M100 115 L100 135 L75 155"/>
    <path d="M115 130 L115 150 L95 165"/>
    <path d="M130 145 L150 160 L150 175"/>
    <path d="M85 155 L70 170 L70 185"/>
    <path d="M100 155 L100 175 L120 190"/>

    <!-- 分支 -->
    <path d="M80 75 L65 85"/>
    <path d="M120 70 L135 60"/>
    <path d="M85 115 L70 105"/>
    <path d="M115 110 L130 100"/>
    <path d="M60 130 L45 140"/>
    <path d="M75 155 L60 165"/>
    <path d="M95 165 L80 180"/>
    <path d="M120 190 L135 200"/>

    <!-- 节点圆点 -->
    <circle cx="100" cy="55" r="2.5" fill="rgba(168,216,234,0.8)" stroke="none"/>
    <circle cx="80" cy="75" r="2" fill="rgba(168,216,234,0.7)" stroke="none"/>
    <circle cx="120" cy="70" r="2" fill="rgba(168,216,234,0.7)" stroke="none"/>
    <circle cx="100" cy="95" r="2.5" fill="rgba(168,216,234,0.8)" stroke="none"/>
    <circle cx="80" cy="115" r="2" fill="rgba(168,216,234,0.7)" stroke="none"/>
    <circle cx="115" cy="110" r="2" fill="rgba(168,216,234,0.7)" stroke="none"/>
    <circle cx="60" cy="130" r="2" fill="rgba(168,216,234,0.6)" stroke="none"/>
    <circle cx="130" cy="145" r="2" fill="rgba(168,216,234,0.6)" stroke="none"/>
    <circle cx="85" cy="155" r="2" fill="rgba(168,216,234,0.6)" stroke="none"/>
    <circle cx="100" cy="155" r="2" fill="rgba(168,216,234,0.6)" stroke="none"/>
    <circle cx="115" cy="150" r="2" fill="rgba(168,216,234,0.6)" stroke="none"/>
    <circle cx="75" cy="155" r="1.5" fill="rgba(168,216,234,0.5)" stroke="none"/>
    <circle cx="95" cy="165" r="1.5" fill="rgba(168,216,234,0.5)" stroke="none"/>
    <circle cx="70" cy="170" r="1.5" fill="rgba(168,216,234,0.5)" stroke="none"/>
    <circle cx="120" cy="190" r="1.5" fill="rgba(168,216,234,0.5)" stroke="none"/>
  </g>

  <!-- 底部基座 -->
  <ellipse cx="100" cy="205" rx="28" ry="5"
           fill="rgba(168,216,234,0.25)"
           stroke="rgba(168,216,234,0.4)"
           stroke-width="1"/>

  <!-- 底部文字 -->
  <text x="100" y="232"
        text-anchor="middle"
        font-family="'Noto Serif SC', 'SimSun', serif"
        font-size="22"
        font-weight="600"
        fill="#2a2520"
        letter-spacing="4">宋染</text>
</svg>